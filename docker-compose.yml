version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gmh-postgres
    environment:
      POSTGRES_USER: gmh_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: globalmarkethub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gmh-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gmh_user']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gmh-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - gmh-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gmh-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://gmh_user:secure_password_123@postgres:5432/globalmarkethub
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_key_here
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY}
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - gmh-network
    command: npm start

  # Frontend App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gmh-frontend
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://backend:5000/api
      REACT_APP_STRIPE_KEY: ${STRIPE_PUBLIC_KEY}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - gmh-network
    command: npm start

volumes:
  postgres_data:
  redis_data:

networks:
  gmh-network:
    driver: bridge
